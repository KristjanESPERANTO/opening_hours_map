name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: Prepare Pages artifact
        run: |
          set -euo pipefail

          # Build top-level OL10 application bundle.
          npm ci
          rm -rf build
          mkdir -p build
          npm run build

          # Build opening_hours.js assets without running top-level commit-signature checks.
          make --directory opening_hours.js ready-for-hosting

          rm -rf _site
          mkdir -p _site

          # Copy only files required at runtime.
          cp index.html _site/index.html
          rsync -a css/ _site/css/
          rsync -a js/ _site/js/
          rsync -a img/ _site/img/
          rsync -a build/ _site/build/

          # Copy opening_hours.js assets and resolve symlinks for Pages artifact.
          mkdir -p _site/opening_hours.js/build
          mkdir -p _site/opening_hours.js/site
          rsync -a -L opening_hours.js/build/ _site/opening_hours.js/build/
          rsync -a -L opening_hours.js/site/ _site/opening_hours.js/site/
          rsync -a -L opening_hours.js/site/ _site/evaluation_tool/

          # Provide i18next ESM runtime under the original source path.
          mkdir -p _site/opening_hours.js/node_modules/i18next/dist/esm
          rsync -a opening_hours.js/node_modules/i18next/dist/esm/ _site/opening_hours.js/node_modules/i18next/dist/esm/

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v4
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
